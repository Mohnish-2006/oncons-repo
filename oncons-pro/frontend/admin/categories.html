<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Categories - OnCons</title><link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="/assets/css/styles.css"></head><body>
<div class="dash-layout"><aside class="dash-side"><a href="/admin/index.html">Overview</a><a href="/admin/users.html">Users</a><a href="/admin/experts.html">Consultants</a><a href="/admin/bookings.html">Bookings</a><a href="/admin/payments.html">Payments</a><a href="/admin/complaints.html">Complaints</a><a href="/admin/reports.html">Reports</a><a href="/admin/categories.html" class="active">Categories</a><a href="/admin/audit-logs.html">Audit Logs</a><a href="/admin/settings.html">Settings</a><a href="/admin/health.html">Health</a></aside><main class="dash-main"><h1>Categories</h1><section class="admin-panel"><form class="action-row" onsubmit="createCategory(event)"><input name="name" placeholder="Category" required><input name="icon" placeholder="Icon label"><button class="btn btn-primary">Add</button></form><div id="out" class="admin-list"></div></section></main></div>
<script src="/assets/js/config.js"></script><script src="/assets/js/shared.js"></script><script>requireAuth("admin");</script><script>
async function load(){const rows=await api('/admin/categories');out.innerHTML=rows.length?rows.map(x=>`<div class="admin-payment"><strong>${escapeHtml(x.name)}</strong><small>${escapeHtml(x.icon||'')}</small><span>#${x.id}</span></div>`).join(''):'<div class="empty-state">No categories.</div>'}
async function createCategory(e){e.preventDefault();const f=Object.fromEntries(new FormData(e.target));await api('/admin/categories',{method:'POST',body:JSON.stringify(f)});e.target.reset();load()}
load();
</script></body></html>
