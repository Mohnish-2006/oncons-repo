<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reports - OnCons</title><link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="/assets/css/styles.css"></head><body>
<div class="dash-layout"><aside class="dash-side"><a href="/admin/index.html">Overview</a><a href="/admin/users.html">Users</a><a href="/admin/experts.html">Consultants</a><a href="/admin/bookings.html">Bookings</a><a href="/admin/payments.html">Payments</a><a href="/admin/complaints.html">Complaints</a><a href="/admin/reports.html" class="active">Reports</a><a href="/admin/categories.html">Categories</a><a href="/admin/audit-logs.html">Audit Logs</a><a href="/admin/settings.html">Settings</a><a href="/admin/health.html">Health</a></aside><main class="dash-main"><h1>Reports</h1><div id="out" class="admin-panel">Loading...</div></main></div>
<script src="/assets/js/config.js"></script><script src="/assets/js/shared.js"></script><script>requireAuth("admin");</script><script>
async function load(){const rows=await api('/admin/reports');out.innerHTML=rows.length?rows.map(x=>`<div class="admin-payment"><div><strong>${escapeHtml(x.target_type)} #${x.target_id}</strong><br><small>${escapeHtml(x.reason)}</small></div><div>${escapeHtml(x.status)}</div><button class="btn btn-ghost" onclick="closeItem(${x.id})">Close</button></div>`).join(''):'<div class="empty-state">No reports.</div>'}
async function closeItem(id){await api('/admin/reports/'+id,{method:'PATCH',body:JSON.stringify({status:'closed'})});load()}
load();
</script></body></html>
