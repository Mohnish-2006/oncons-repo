<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — OnCons</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/styles.css">

</head><body data-no-chrome="true">

<main class="login-screen">
  <section class="login-panel">
    <div class="login-brand">On<span>Cons</span></div>
    <p class="section-tag">Secure sign in</p>
    <h1>Welcome back</h1>
    <p class="login-copy">Sign in to book experts, pay for sessions, and manage your consultations.</p>
    <form class="form" onsubmit="login(event)">
      <label>Email<input required type="email" name="email" autocomplete="email"></label>
      <label>Password<input required type="password" name="password" autocomplete="current-password"></label>
      <button class="btn btn-primary">Sign in</button>
      <a href="/forgot-password.html" style="text-align:center;color:var(--teal);font-size:.85rem">Forgot password?</a>
      <div id="msg"></div>
      <p style="text-align:center;font-size:.85rem">New here? <a href="/register.html" style="color:var(--teal)">Get started</a></p>
    </form>
  </section>
</main>

<script src="/assets/js/shared.js"></script>
<script>
async function login(e){e.preventDefault();const f=Object.fromEntries(new FormData(e.target));
try{const r=await api('/auth/login',{method:'POST',body:JSON.stringify(f)});tokenSet(r.access_token);userSet(r.user);location.href='/index.html';}
catch(err){document.getElementById('msg').innerHTML='<div class="alert alert-error">'+err.message+'</div>'}}
</script>
</body></html>
