<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot password - OnCons</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/styles.css">
</head><body data-no-chrome="true">

<main class="login-screen">
  <section class="login-panel">
    <div class="login-brand">On<span>Cons</span></div>
    <h1 id="title">Reset your password</h1>
    <p class="login-copy" id="copy">Enter your account email and we will send a secure reset link.</p>
    <form class="form" id="requestForm" onsubmit="requestReset(event)">
      <label>Email<input required type="email" name="email" autocomplete="email"></label>
      <button class="btn btn-primary">Send reset link</button>
    </form>
    <form class="form hidden" id="resetForm" onsubmit="submitReset(event)">
      <label>New password<input required type="password" minlength="10" name="password" autocomplete="new-password" title="Use at least 10 characters with uppercase, lowercase, number, and symbol."></label>
      <button class="btn btn-primary">Set new password</button>
    </form>
    <div id="msg"></div>
  </section>
</main>

<script src="/assets/js/config.js"></script>
<script src="/assets/js/shared.js"></script>
<script>
const token=new URLSearchParams(location.search).get('token');
if(token){
  title.textContent='Set a new password';
  copy.textContent='Use a strong password. After reset, all active sessions are signed out.';
  requestForm.classList.add('hidden');
  resetForm.classList.remove('hidden');
}
async function requestReset(e){
  e.preventDefault();
  const f=Object.fromEntries(new FormData(e.target));
  try{await api('/auth/forgot-password',{method:'POST',body:JSON.stringify(f)});msg.innerHTML='<div class="alert alert-ok">If the account exists, a reset link has been sent.</div>'}
  catch(err){msg.innerHTML='<div class="alert alert-error">'+escapeHtml(err.message)+'</div>'}
}
async function submitReset(e){
  e.preventDefault();
  const f=Object.fromEntries(new FormData(e.target));
  try{await api('/auth/reset-password',{method:'POST',body:JSON.stringify({token,password:f.password})});tokenClear();showToast('Password updated. Sign in again.');setTimeout(()=>location.href='/login.html',900)}
  catch(err){msg.innerHTML='<div class="alert alert-error">'+escapeHtml(err.message)+'</div>'}
}
</script>
</body></html>
